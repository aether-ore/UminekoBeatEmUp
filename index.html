<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Golden Witch Brawl</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="Game status">
        <div>
          <span class="label">Battler</span>
          <div class="meter"><span id="healthBar"></span></div>
        </div>
        <div class="center-stat">
          <strong id="waveLabel">Wave 1</strong>
          <span id="scoreLabel">Score 0</span>
          <div class="score-blessing-meter" aria-label="Score blessing progress">
            <span id="scoreBlessingBar"></span>
          </div>
        </div>
        <div>
          <span class="label">Resolve</span>
          <div class="meter meter-gold"><span id="resolveBar"></span></div>
        </div>
      </section>

      <div class="game-stage">
        <canvas id="game" width="1280" height="720" aria-label="Final fight style side scrolling beat-em-up"></canvas>

        <div id="touchControls" class="touch-controls" aria-label="Touch controls" hidden>
          <div class="touch-stick" data-touch-stick aria-label="Move">
            <span class="touch-stick__nub"></span>
          </div>
          <div class="touch-buttons" aria-label="Actions">
            <button type="button" class="touch-button touch-button--pause" data-touch-action="pause">Pause</button>
            <label class="touch-adjust-toggle">
              <input id="touchAdjustToggle" type="checkbox">
              <span>Adjust UI</span>
            </label>
            <button type="button" class="touch-button touch-button--toggle" data-touch-action="touchToggle">Touch Off</button>

            <button type="button" class="touch-button touch-button--orb touch-button--duo" data-touch-action="duo">Duo</button>
            <button type="button" class="touch-button touch-button--orb touch-button--special" data-touch-action="special">Special</button>
            <button type="button" class="touch-button touch-button--run" data-touch-action="run">Dodge/Run</button>
            <div class="touch-attack-core" data-touch-adjust-target="attack">
              <button type="button" class="touch-attack-half touch-attack-half--punch" data-touch-action="punch">Punch</button>
              <button type="button" class="touch-attack-half touch-attack-half--kick" data-touch-action="kick">Kick</button>
            </div>
            <div id="touchAdjustSizer" class="touch-adjust-sizer" hidden>
              <input id="touchAdjustSize" type="range" min="75" max="135" value="100" orient="vertical" aria-label="Selected touch control size">
            </div>
          </div>
        </div>

        <div id="orientationPrompt" class="orientation-prompt" hidden>
          <div class="orientation-prompt__card">
            <span class="orientation-prompt__icon">Turn</span>
            <strong>Rotate to landscape</strong>
            <span>This brawl needs a wider stage.</span>
          </div>
        </div>
      </div>

      <section id="runDetailsPanel" class="run-details" aria-label="Run details" hidden>
        <div class="run-details__backdrop" data-run-details-close></div>
        <article class="run-details__card">
          <header>
            <div>
              <span id="runDetailsKicker" class="label">Most Recent Run</span>
              <h2 id="runDetailsTitle">Run Details</h2>
            </div>
            <button id="runDetailsClose" type="button" aria-label="Close run details">Close</button>
          </header>
          <div id="runDetailsList" class="run-details__list"></div>
        </article>
      </section>

      <section class="controls" aria-label="Controls">
        <div class="controls__group controls__group--left">
          <span>Move: WASD / Arrows</span>
          <span>Run: Hold Shift</span>
          <span>Punch: J</span>
          <span>Kick: K</span>
        </div>
        <span id="parryTip">Parry: Punch / Kick</span>
        <div class="controls__group controls__group--right">
          <span>Charge: Hold J/K</span>
          <span>Special: L</span>
          <span>Duo: Hold Q</span>
          <span>Pause: P / Esc</span>
          <span>Start / Restart: Enter</span>
          <button id="touchToggle" class="controls__touch-toggle" type="button">Touch: Auto</button>
        </div>
      </section>
    </main>

    <script src="game.js?v=20260623"></script>
  </body>
</html>
